<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indy 500 v1</title>

    <!-- normalize css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- google fonts! -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Sansation:wght@300&display=swap" rel="stylesheet">

    <!-- styles! -->
    <link rel="stylesheet" href="styles.css">

    <!-- scripting -->
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>INDY-500 RACE</h1>
    </header>

    <main>
        <section class="player" id="player1">
            <div class="racetrack">
                <img src="" alt="racetrack">
                <img src="" alt="racecar">
            </div>
            <section class="playerstats" id="player1stats">
                <div class="seperator">
                    <p id="lap">Lap</p>
                    <p class="lapnumber" id="lapplayer2">275</p>
                </div>
                <div class="seperator">
                    <p class="fuel">Fuel</p>
                    <div class="fuelbar" id="fuelbar2"></div>
                </div>
            </section>

        </section>
        <section class="player" id="player2">
            <div class="racetrack">
                <img src="" alt="racetrack">
                <img src="" alt="racecar">
            </div>
            <section class="playerstats" id="player2stats">
                <div class="seperator">
                    <p id="lap">Lap</p>
                    <p class="lapnumber" id="lapplayer2">150</p>
                </div>
                <div class="seperator">
                    <p class="fuel">Fuel</p>
                    <div class="fuelbar" id="fuelbar2"></div>
                </div>
            </section>
        </section>
    </main>
    <footer>
        <section class="dicerolls">
            <img src="" alt="dice1" class="dice" id="dice1">
            <img src="" alt="dice2" class="dice" id="dice2">
        </section>
        <section class="buttonselection">
            <button id="rolldicebtn">Roll Dice</button>
            <button id="refuelbtn">Refuel</button>
        </section>
    </footer>
</body> 
</html>
